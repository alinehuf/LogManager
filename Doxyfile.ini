# Project name displayed in the documentation
PROJECT_NAME           = "LogManager Plugin"
PROJECT_BRIEF          = "UE5 plugin for structured JSON session logging"

# Files to be documented (only the 3 relevant files)
INPUT                  = Plugins/LogManager/Source/LogManager/Public/LogManagerConstants.h \
                         Plugins/LogManager/Source/LogManager/Public/LogManagerBPFunctionLibrary.h \
                         Plugins/LogManager/Source/LogManager/Private/LogManagerBPFunctionLibrary.cpp

PREDEFINED             = UENUM(x)= \
                         UMETA(x)= \
                         BlueprintType= \
                         GENERATED_BODY()= \
                         UCLASS()= \
                         UFUNCTION(x)=

# Do not automatically browse subfolders
RECURSIVE              = NO

# Output directory
OUTPUT_DIRECTORY       = Docs/

# Generate HTML output
GENERATE_HTML          = YES
GENERATE_LATEX         = NO

# Also extract non-public members if necessary
EXTRACT_ALL            = YES
EXTRACT_STATIC         = YES
EXTRACT_PRIVATE        = NO

# Enable diagrams (requires Graphviz)
HAVE_DOT               = YES
CALL_GRAPH             = YES

# Interpret the //! and /** comments as Doxygen
JAVADOC_AUTOBRIEF      = YES